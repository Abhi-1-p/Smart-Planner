<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DailyFlow Planner</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

/* ============================================================
   GLOBAL FONTS + RESET
   ============================================================ */
body {
    font-family: "Inter", sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s ease, color 0.3s ease;
}
.handwritten { font-family: 'Patrick Hand', cursive; }

/* ============================================================
   THEMES (6 Themes)
   ============================================================ */
:root {
    --accent: #4ade80; /* mint */
    --accent-soft: rgba(74,222,128,0.15);
    --bg: #f8f9fb;
    --text: #1f2937;
    --card-bg: rgba(255,255,255,0.35);
    --card-border: rgba(255,255,255,0.4);
}

.theme-blush {
    --accent: #fb7185;
    --accent-soft: rgba(251,113,133,0.2);
}
.theme-lavender {
    --accent: #c084fc;
    --accent-soft: rgba(192,132,252,0.15);
}
.theme-ocean {
    --accent: #38bdf8;
    --accent-soft: rgba(56,189,248,0.15);
}
.theme-sunset {
    --accent: #f97316;
    --accent-soft: rgba(249,115,22,0.15);
}
.theme-slate {
    --accent: #64748b;
    --accent-soft: rgba(100,116,139,0.15);
}

/* DARK MODE */
.dark {
    --bg: #0d0f12;
    --text: #e5e7eb;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.1);
}

/* ============================================================
   GLASS CARD STYLE
   ============================================================ */
.glass-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    padding: 24px;
}

/* ============================================================
   HEADER (Glassmorphism)
   ============================================================ */
header {
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.4);
}

.logo-icon {
    width: 32px;
    height: 32px;
}

/* ============================================================
   LOGIN MODAL
   ============================================================ */
#login-modal {
    display: none;
}

.modal-backdrop {
    background: rgba(0,0,0,0.45);
}

/* ============================================================
   TOGGLES & BUTTONS
   ============================================================ */
.theme-btn { 
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
}
.theme-btn.active { border-color: var(--accent); }

.toggle-dark {
    width: 48px;
    height: 24px;
    background: var(--accent-soft);
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
}
.toggle-dark::after {
    content: "";
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 50%;
    position: absolute;
    left: 3px; top: 2px;
    transition: 0.3s;
}
.dark .toggle-dark::after {
    transform: translateX(24px);
}

/* ============================================================
   CALENDAR HOVER EFFECT
   ============================================================ */
.calendar-day:hover {
    transform: scale(1.08);
    transition: 0.15s ease;
    background: var(--accent-soft) !important;
}

/* smooth fade */
.fade-in { animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity:0;} to {opacity:1;} }

</style>
</head>

<body class="fade-in">

<!-- ============================================================
     LOGIN MODAL (Name + Password)

<div id="login-modal" class="fixed inset-0 flex items-center justify-center modal-backdrop z-[9999]">

<!-- ============================================================
     GLOSSY HEADER WITH LOGO & NAV

<header class="shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">

        <!-- Right-side controls -->

                <div class="theme-btn" style="background:#fb7185;" onclick="setTheme('blush')"></div>
                <div class="theme-btn" style="background:#c084fc;" onclick="setTheme('lavender')"></div>
                <div class="theme-btn" style="background:#38bdf8;" onclick="setTheme('ocean')"></div>
                <div class="theme-btn" style="background:#f97316;" onclick="setTheme('sunset')"></div>

            <!-- User Badge -->

     MAIN CONTENT WRAPPER
   ============================================================ -->
<main id="main-view" class="flex-1 max-w-6xl mx-auto w-full p-6 space-y-10 fade-in">

<!-- GRID LAYOUT --------------------------------------------------- -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

    <!-- LEFT COLUMN ================================================= -->
    <div class="lg:col-span-3 space-y-6">

        <!-- CALENDAR ------------------------------------------------- -->

        <!-- PRIORITIES ------------------------------------------------ -->
        <div class="glass-card">

            <div id="priority-list" class="space-y-3"></div>

            <button onclick="addPriority()"

    </div>

    <!-- MIDDLE COLUMN =============================================== -->

        <!-- DAILY FLOW HEADER ---------------------------------------- -->
        <div class="glass-card">

            <!-- TASKS ------------------------------------------------ -->
            <div class="mb-10">

    <!-- RIGHT COLUMN =============================================== -->
    <div class="lg:col-span-3 space-y-6">

<button id="save-btn"

<!-- ============================================================

<div id="search-panel"

<script>
/* ======================================================================
   FIREBASE INITIALIZATION
   ====================================================================== */

const firebaseConfig = {
    apiKey: "",
    authDomain: "",
    projectId: "",
    storageBucket: "",
    messagingSenderId: "",
    appId: ""
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let activeProfileId = null;
let activeUserName = "";
let activeDate = new Date().toISOString().split("T")[0];

let dailyData = {};
let saveTimer = null;


/* ======================================================================
   LOGIN LOGIC — NAME + PASSWORD + FIRESTORE PROFILE STORAGE
   ====================================================================== */

// SHA-256 hashing for password (client-side)
async function hashPassword(str) {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest("SHA-256", buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function userLogin() {
    const name = document.getElementById("login-name").value.trim();
    const pass = document.getElementById("login-pass").value.trim();

    if (!name || !pass) {
        alert("Enter both name and password.");
        return;
    }

    const hashed = await hashPassword(pass);
    const profileId = "user_" + btoa(name).replace(/=/g, "");

    // Check if profile exists
    const docRef = db.collection("profiles").doc(profileId);
    const snap = await docRef.get();

    if (!snap.exists) {
        // Create new user
        await docRef.set({
            id: profileId,
            name,
            passHash: hashed,
            theme: "mint",
            darkMode: false
        });
    } else {
        if (snap.data().passHash !== hashed) {
            alert("Incorrect password.");
            return;
        }
    }

    activeProfileId = profileId;
    activeUserName = name;

    // Save to localStorage
    localStorage.setItem("DF_user", name);
    localStorage.setItem("DF_hash", hashed);
    localStorage.setItem("DF_uid", profileId);

    // Close modal
    document.getElementById("login-modal").style.display = "none";

    // UI updates
    document.getElementById("user-badge").innerText = name[0].toUpperCase();
    document.getElementById("name-bar").innerText = `Hello, ${name} 👋 — ${new Date().toLocaleDateString("en-US", 
        { weekday:"long", month:"short", day:"numeric"})}`;

    // Load preferences
    const prefs = (await docRef.get()).data();
    setTheme(prefs.theme);
    setDarkMode(prefs.darkMode);

    loadEntry(activeDate);
}


/* ======================================================================
   AUTO LOGIN (if saved in localStorage)
   ====================================================================== */
(async function autoLogin() {
    const name = localStorage.getItem("DF_user");
    const hash = localStorage.getItem("DF_hash");
    const uid  = localStorage.getItem("DF_uid");

    if (!name || !hash || !uid) {
        document.getElementById("login-modal").style.display = "flex";
        return;
    }

    const docRef = db.collection("profiles").doc(uid);
    const snap = await docRef.get();

    if (!snap.exists || snap.data().passHash !== hash) {
        document.getElementById("login-modal").style.display = "flex";
        return;
    }

    activeProfileId = uid;
    activeUserName = name;

    // update UI
    document.getElementById("login-modal").style.display = "none";
    document.getElementById("user-badge").innerText = name[0].toUpperCase();
    document.getElementById("name-bar").innerText = `Hello, ${name} 👋 — ${new Date().toLocaleDateString("en-US", 
        { weekday:"long", month:"short", day:"numeric"})}`;

    // load theme prefs
    const prefs = snap.data();
    setTheme(prefs.theme);
    setDarkMode(prefs.darkMode);

    loadEntry(activeDate);
})();


/* ======================================================================
   THEME SYSTEM (6 THEMES)
   ====================================================================== */

function setTheme(themeName) {
    document.body.classList.remove(
        "theme-blush", "theme-lavender", "theme-ocean", "theme-sunset", "theme-slate"
    );

    if (themeName !== "mint") {
        document.body.classList.add(`theme-${themeName}`);
    }

    localStorage.setItem("DF_theme", themeName);

    // Update Firestore
    if (activeProfileId) {
        db.collection("profiles").doc(activeProfileId).update({ theme: themeName });
    }

    // Highlight active theme
    document.querySelectorAll(".theme-btn").forEach(btn => btn.classList.remove("active"));
    const indexMap = { mint:0, blush:1, lavender:2, ocean:3, sunset:4, slate:5 };
    document.querySelectorAll(".theme-btn")[indexMap[themeName]].classList.add("active");
}


/* ======================================================================
   DARK MODE SYSTEM
   ====================================================================== */

function toggleDarkMode() {
    const enabled = !document.body.classList.contains("dark");
    setDarkMode(enabled);
}

function setDarkMode(enabled) {
    if (enabled) document.body.classList.add("dark");
    else document.body.classList.remove("dark");

    localStorage.setItem("DF_dark", enabled ? "1" : "0");

    if (activeProfileId) {
        db.collection("profiles").doc(activeProfileId).update({ darkMode: enabled });
    }
}


/* ======================================================================
   CALENDAR RENDERING (THEME + DARK MODE)
   ====================================================================== */

function renderCalendar() {
    const calendarEl = document.getElementById("calendar-grid");
    calendarEl.innerHTML = "";

    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();
    const days = new Date(year, month + 1, 0).getDate();

    const weekdays = ['S','M','T','W','T','F','S'];
    weekdays.forEach(d => {
        const p = document.createElement("div");
        p.className = "text-xs text-gray-500 dark:text-gray-400 font-bold";
        p.innerText = d;
        calendarEl.appendChild(p);
    });

    for (let i = 1; i <= days; i++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        const isToday = dateStr === new Date().toISOString().split("T")[0];

        const el = document.createElement("div");
        el.innerText = i;
        el.className = 
          "calendar-day p-2 rounded-xl transition font-semibold cursor-pointer " +
          (isToday ? "text-white" : "text-gray-700 dark:text-gray-300");
        
        if (isToday) el.style.background = "var(--accent)";
        else el.style.background = "var(--card-bg)";

        el.onclick = () => loadEntry(dateStr);

        calendarEl.appendChild(el);
    }
}


/* ======================================================================
   LOAD ENTRY FROM FIRESTORE
   ====================================================================== */

async function loadEntry(dateStr) {
    activeDate = dateStr;
    const id = `${activeProfileId}_${dateStr}`;
    const ref = db.collection("plannerEntries").doc(id);
    const snap = await ref.get();

    if (!snap.exists) {
        showPopup("Missing Entry", `No data found for ${dateStr}. New entry created.`);
        dailyData = defaultData(dateStr);
    } else {
        dailyData = snap.data();
    }

    renderAll();
}


/* ======================================================================
   SAVE ENTRY
   ====================================================================== */

async function saveEntry(show = true) {
    if (!activeProfileId) {
        showPopup("Error", "You must log in first.");
        return;
    }

    dailyData.journal = document.getElementById("journal-input").value;
    dailyData.date = activeDate;

    const id = `${activeProfileId}_${activeDate}`;
    await db.collection("plannerEntries").doc(id).set(dailyData);

    if (show) showPopup("Saved!", "Your entry has been updated.");
}


/* ======================================================================
   DEFAULT ENTRY TEMPLATE
   ====================================================================== */

function defaultData(date) {
    return {
        profileId: activeProfileId,
        date,
        priorities: [],
        todos: [],
        schedule: Array.from({length:13},(_,i)=>({time:`${i+9}:00`,task:""})),
        water: 0,
        journal: "",
        ratings: { mood:0, productivity:0, health:0 }
    };
}


/* ======================================================================
   RENDER FUNCTIONS (PRIORITIES, TASKS, SCHEDULE, JOURNAL, RATINGS)
   ====================================================================== */

function renderAll() {
    document.getElementById("journal-input").value = dailyData.journal || "";

    renderCalendar();
    renderPriorities();
    renderTasks();
    renderSchedule();
    renderWater();
    renderRatings();
}


/* priorities */
function renderPriorities() {
    const container = document.getElementById("priority-list");
    container.innerHTML = "";

    dailyData.priorities.forEach((p,i)=>{
        const row = document.createElement("div");
        row.className = "flex items-center gap-3";

        const btn = document.createElement("button");
        btn.innerText = p.completed ? "✔️" : "⭕";
        btn.onclick = ()=>{ p.completed=!p.completed; saveEntry(false); renderPriorities(); };

        const inp = document.createElement("input");
        inp.value = p.text;
        inp.className = "flex-1 p-2 bg-white/40 rounded-xl outline-none handwritten dark:bg-white/10";
        inp.oninput = e=>{ p.text=e.target.value; };

        row.append(btn,inp);
        container.appendChild(row);
    });
}

function addPriority() {
    dailyData.priorities.push({text:"",completed:false});
    renderPriorities();
}


/* tasks */
function renderTasks() {
    const container = document.getElementById("task-list");
    container.innerHTML = "";

    dailyData.todos.forEach((t,i)=>{
        const row = document.createElement("div");
        row.className = "flex items-center gap-3";

        const btn = document.createElement("button");
        btn.innerText = t.completed ? "✔️" : "⭕";
        btn.onclick = ()=>{ t.completed=!t.completed; saveEntry(false); renderTasks(); };

        const inp = document.createElement("input");
        inp.value = t.text;
        inp.className = "flex-1 p-2 bg-white/40 rounded-xl outline-none dark:bg-white/10";
        inp.oninput = e=>{ t.text=e.target.value; };

        if (t.completed) inp.classList.add("line-through","text-gray-500");

        row.append(btn,inp);
        container.appendChild(row);
    });
}

function addTask() {
    dailyData.todos.push({text:"",completed:false});
    renderTasks();
}


/* schedule */
function renderSchedule() {
    const container = document.getElementById("schedule-list");
    container.innerHTML = "";

    dailyData.schedule.forEach((s,i)=>{
        const row = document.createElement("div");
        row.className = "flex items-center gap-4";

        const time = document.createElement("span");
        time.className = "w-12 text-xs text-gray-400 dark:text-gray-500";
        time.innerText = s.time;

        const inp = document.createElement("input");
        inp.value = s.task;
        inp.className = "flex-1 border-b pb-1 bg-transparent outline-none border-gray-400/40";
        inp.oninput = e=>{ s.task=e.target.value; };

        row.append(time,inp);
        container.appendChild(row);
    });
}


/* hydration */
function renderWater() {
    const c = document.getElementById("water-tracker");
    c.innerHTML = "";

    for (let i=1;i<=8;i++){
        const b = document.createElement("button");
        b.className = "text-2xl";
        b.innerText = i<=dailyData.water ? "💧" : "🫧";
        b.onclick =()=>{ dailyData.water=i; renderWater(); saveEntry(false);}
        c.appendChild(b);
    }
}


/* ratings */
function renderRatings() {
    const c = document.getElementById("rating-section");
    c.innerHTML = "";

    const fields = ["mood","productivity","health"];

    fields.forEach(cat=>{
        const block = document.createElement("div");

        const label = document.createElement("div");
        label.className = "flex justify-between text-xs text-gray-500 dark:text-gray-400";
        label.innerHTML = `<span>${cat}</span><span>${dailyData.ratings[cat]}/5</span>`;

        const row = document.createElement("div");
        row.className = "flex gap-2";

        for (let i=1;i<=5;i++){
            const star = document.createElement("button");
            star.innerText = i<=dailyData.ratings[cat] ? "⭐" : "☆";
            star.onclick = ()=>{
                dailyData.ratings[cat] = i;
                renderRatings();
                saveEntry(false);
            };
            row.appendChild(star);
        }

        block.append(label,row);
        c.appendChild(block);
    });
}


/* ======================================================================
   SEARCH ENGINE
   ====================================================================== */

function toggleSearchPanel(){
    document.getElementById("search-panel").classList.toggle("hidden");
}

async function performSearch() {
    const q = document.getElementById("search-input").value.toLowerCase();
    const out = document.getElementById("search-results");
    out.innerHTML = "Searching...";

    const snap = await db.collection("plannerEntries")
        .where("profileId","==",activeProfileId)
        .get();

    const matches = [];

    snap.forEach(doc=>{
        const d = doc.data();
        const str = JSON.stringify(d).toLowerCase();
        if (str.includes(q)) matches.push(d);
    });

    if (matches.length===0){
        out.innerHTML = "<p class='text-gray-400 italic'>No results found.</p>";
        return;
    }

    out.innerHTML = matches.map(m=>`
        <div class='p-4 glass-card mb-2'>
            <p class='font-bold'>${m.date}</p>
            <p class='text-sm text-gray-500 dark:text-gray-300'>
                ${m.journal || "No journal entry."}
            </p>
        </div>
    `).join("");
}


/* ======================================================================
   INSIGHTS CHARTS
   ====================================================================== */

function showInsights(){
    loadCharts();
    document.getElementById("insights-panel").classList.remove("hidden");
}

function hideInsights(){
    document.getElementById("insights-panel").classList.add("hidden");
}

async function loadCharts(){
    const snap = await db.collection("plannerEntries")
        .where("profileId","==",activeProfileId)
        .get();

    const rows = [];
    snap.forEach(doc=>rows.push(doc.data()));
    rows.sort((a,b)=>a.date.localeCompare(b.date));

    const labels = rows.map(r=>r.date);

    // Chart data:
    const mood = rows.map(r=>r.ratings.mood);
    const prod = rows.map(r=>r.ratings.productivity);
    const water = rows.map(r=>r.water);
    const taskPct = rows.map(r =>
        r.todos.length===0 ? 0 :
        Math.round((r.todos.filter(t=>t.completed).length / r.todos.length)*100)
    );

    makeLineChart("chart-mood", labels, mood, "Mood", "#c084fc");
    makeLineChart("chart-productivity", labels, prod, "Productivity", "#38bdf8");
    makeBarChart("chart-water", labels, water, "Hydration", "#4ade80");
    makeBarChart("chart-tasks", labels, taskPct, "Task %", "#f97316");
}

function makeLineChart(id, labels, data, label, color) {
    new Chart(document.getElementById(id),{
        type:"line",
        data:{ labels, datasets:[{
            label,
            data,
            borderColor: color,
            backgroundColor: color + "33",
            tension:0.3,
            borderWidth:2
        }] }
    });
}

function makeBarChart(id, labels, data, label, color) {
    new Chart(document.getElementById(id),{
        type:"bar",
        data:{ labels, datasets:[{
            label,
            data,
            backgroundColor: color
        }] }
    });
}


/* ======================================================================
   POPUP UTILITY
   ====================================================================== */

function showPopup(title,msg){
    document.getElementById("popup-title").innerText = title;
    document.getElementById("popup-message").innerText = msg;
    document.getElementById("popup-container").classList.remove("hidden");
    document.getElementById("popup-container").classList.add("flex");
}

function closePopup(){
    document.getElementById("popup-container").classList.add("hidden");
}


/* ======================================================================
   AUTO-SAVE (Debounced)
   ====================================================================== */

document.addEventListener("input",()=>{
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>saveEntry(false), 900);
});


/* ======================================================================
   SIMPLE LOCAL “AI-LIKE” SUMMARY (Heuristic)
   ====================================================================== */

function generateAISummary() {
    const text = dailyData.journal || "";
    if (!text || text.length < 20) {
        showPopup("AI Summary", "Not enough journal content to summarize.");
        return;
    }

    const parts = text.split(/[.!?]/).filter(s=>s.trim().length>4);
    let summary = "";

    if (parts.length === 1) summary = parts[0];
    else summary = parts.slice(0,2).join(". ") + "...";

    showPopup("AI Summary", summary);
}

});
